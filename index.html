<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Gezi Harcama</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Harcama">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --card2: #232733;
    --text: #f2f3f5;
    --muted: #8b919e;
    --accent: #4f8cff;
    --green: #34c77b;
    --red: #e05252;
    --radius: 16px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; }
  body { min-height: 100vh; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
  .screen { display: none; max-width: 480px; margin: 0 auto; padding: 24px 20px 40px; }
  .screen.active { display: block; }
  h1 { font-size: 26px; font-weight: 700; margin: 12px 0 4px; }
  .sub { color: var(--muted); font-size: 14px; margin: 0 0 28px; }

  .bigbtn { display: flex; align-items: center; gap: 16px; width: 100%;
    background: var(--card); border: 1px solid #2a2f3a; border-radius: var(--radius);
    padding: 22px 20px; margin-bottom: 16px; color: var(--text); font-size: 18px;
    font-weight: 600; cursor: pointer; text-align: left; }
  .bigbtn:active { background: var(--card2); }
  .bigbtn .emoji { font-size: 28px; }
  .bigbtn .desc { display: block; font-size: 13px; font-weight: 400; color: var(--muted); margin-top: 3px; }

  .back { background: none; border: none; color: var(--accent); font-size: 16px;
    padding: 0; margin-bottom: 8px; cursor: pointer; }

  label { display: block; font-size: 13px; color: var(--muted); margin: 18px 0 6px; }
  input[type="date"], input[type="text"], input[type="url"] {
    width: 100%; background: var(--card); border: 1px solid #2a2f3a; border-radius: 12px;
    color: var(--text); font-size: 17px; padding: 14px; appearance: none; -webkit-appearance: none; }
  input[type="date"] { min-height: 50px; }
  .amount-wrap { position: relative; }
  .amount-wrap .prefix { position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 17px; }
  #amount { width: 100%; background: var(--card); border: 1px solid #2a2f3a; border-radius: 12px;
    color: var(--text); font-size: 17px; padding: 14px 14px 14px 46px; -webkit-appearance: none; }
  .usd-hint { font-size: 13px; color: var(--muted); margin-top: 6px; min-height: 16px; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .chip { background: var(--card); border: 1px solid #2a2f3a; border-radius: 20px;
    padding: 9px 15px; font-size: 14px; color: var(--text); cursor: pointer; }
  .chip.sel { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

  .seg { display: flex; background: var(--card); border: 1px solid #2a2f3a;
    border-radius: 12px; padding: 4px; margin-bottom: 4px; }
  .seg button { flex: 1; background: none; border: none; border-radius: 9px; padding: 11px;
    font-size: 15px; color: var(--muted); font-weight: 600; cursor: pointer; }
  .seg button.sel { background: var(--accent); color: #fff; }

  .day-row { display: flex; justify-content: space-between; align-items: center;
    background: var(--card); border: 1px solid #2a2f3a; border-radius: 12px;
    padding: 13px 16px; margin-bottom: 8px; cursor: pointer; }
  .day-row.zero { opacity: .4; }
  .day-row .d { font-size: 15px; }
  .day-row .t { font-weight: 600; font-size: 15px; text-align: right; }
  .day-row .t small { display: block; font-weight: 400; color: var(--muted); font-size: 12px; }
  .item .meta { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; }

  #catChart { background: var(--card); border: 1px solid #2a2f3a; border-radius: var(--radius);
    padding: 18px; margin-top: 16px; margin-bottom: 16px; display: none; }
  #catChart.show { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .legend { width: 100%; }
  .legend-row { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 8px; }
  .legend-row:last-child { margin-bottom: 0; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .legend-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .legend-val { color: var(--muted); white-space: nowrap; }

  .primary { width: 100%; background: var(--accent); border: none; border-radius: 12px;
    color: #fff; font-size: 17px; font-weight: 600; padding: 16px; margin-top: 28px; cursor: pointer; }
  .primary:active { opacity: .85; }
  .primary:disabled { opacity: .5; }

  .toast { position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%) translateY(20px);
    background: var(--green); color: #fff; padding: 12px 22px; border-radius: 16px;
    font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none; transition: all .25s;
    z-index: 50; max-width: 90%; width: max-content; text-align: center; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.err { background: var(--red); }

  .total-card { background: var(--card); border: 1px solid #2a2f3a; border-radius: var(--radius);
    padding: 20px; margin-top: 20px; text-align: center; }
  .total-card .idr { font-size: 30px; font-weight: 700; }
  .total-card .usd { font-size: 17px; color: var(--green); margin-top: 4px; font-weight: 600; }
  .total-card .label { font-size: 13px; color: var(--muted); margin-bottom: 6px; }

  .items { margin-top: 16px; }
  .item { display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border: 1px solid #2a2f3a; border-radius: 12px;
    padding: 14px 16px; margin-bottom: 10px; cursor: pointer; }
  .item:active { background: var(--card2); }
  .item .name { font-size: 16px; }
  .item .right { display: flex; align-items: center; gap: 12px; }
  .item .amt { font-size: 16px; font-weight: 600; white-space: nowrap; }
  .item .amt small { display: block; font-weight: 400; color: var(--muted); font-size: 12px; text-align: right; }
  .item .del { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; }
  .empty { text-align: center; color: var(--muted); padding: 30px 0; font-size: 15px; }

  .rate-note { text-align: center; color: var(--muted); font-size: 12px; margin-top: 24px; }
  .pending-note { display: block; width: 100%; background: none; border: 1px solid #5a4a1e;
    border-radius: 12px; color: #e8b84a; font-size: 13px; margin-top: 10px; padding: 10px; cursor: pointer; }
  .gear { display: block; margin: 18px auto 0; background: none; border: none;
    color: var(--muted); font-size: 13px; cursor: pointer; }
  .setup-err { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 16px; line-height: 1.4; }

  .setup-box { background: var(--card); border-radius: var(--radius); padding: 20px; margin-top: 20px; }
  .setup-box p { font-size: 14px; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>

<!-- ANA SAYFA -->
<section id="home" class="screen active">
  <h1>Gezi Harcama 🧳</h1>
  <p class="sub">Günlük harcamaları kaydetme ve görüntüleme</p>
  <button class="bigbtn" onclick="show('entry')">
    <span class="emoji">✏️</span>
    <span>Harcama Girişi<span class="desc">Yeni bir harcama kaydet</span></span>
  </button>
  <button class="bigbtn" onclick="show('check')">
    <span class="emoji">📊</span>
    <span>Harcama Kontrol<span class="desc">Gün seç, toplamı gör</span></span>
  </button>
  <p class="rate-note" id="rateNote"></p>
  <button class="pending-note" id="pendingNote" style="display:none" onclick="retryPending()"></button>
  <button class="gear" onclick="show('setup')">⚙️ Ayarlar</button>
</section>

<!-- HARCAMA GİRİŞİ -->
<section id="entry" class="screen">
  <button class="back" id="entryBack" onclick="exitEntry()">‹ Ana Sayfa</button>
  <h1 id="entryTitle">Harcama Girişi</h1>
  <label for="entryDate">Tarih</label>
  <input type="date" id="entryDate">
  <div id="nameField">
    <label for="entryName">Harcama kalemi</label>
    <input type="text" id="entryName" placeholder="Örn. Akşam yemeği" autocomplete="off">
  </div>
  <label>Kategori</label>
  <div class="chips" id="catChips"></div>
  <div id="subField" style="display:none">
    <label>Alt kategori</label>
    <div class="chips" id="subChips"></div>
  </div>
  <label for="entryNote">Not (isteğe bağlı)</label>
  <input type="text" id="entryNote" placeholder="Örn. Wat Arun" autocomplete="off">
  <label for="amount">Tutar (IDR)</label>
  <div class="amount-wrap">
    <span class="prefix">Rp</span>
    <input type="text" id="amount" inputmode="numeric" placeholder="150.000" autocomplete="off">
  </div>
  <div class="usd-hint" id="usdHint"></div>
  <button class="primary" id="saveBtn" onclick="saveExpense()">Kaydet</button>
</section>

<!-- HARCAMA KONTROL -->
<section id="check" class="screen">
  <button class="back" onclick="show('home')">‹ Ana Sayfa</button>
  <h1>Harcama Kontrol</h1>
  <div class="seg">
    <button id="segDay" class="sel" onclick="setCheckMode('day')">Gün</button>
    <button id="segMonth" onclick="setCheckMode('month')">Ay</button>
  </div>

  <div id="dayView">
    <label for="checkDate">Gün seç</label>
    <input type="date" id="checkDate" onchange="loadDay()">
    <div class="total-card">
      <div class="label">Günün toplamı</div>
      <div class="idr" id="dayTotalIdr">Rp 0</div>
      <div class="usd" id="dayTotalUsd">$0.00</div>
    </div>
    <div class="items" id="itemList"></div>
  </div>

  <div id="monthView" style="display:none">
    <label for="checkMonth">Ay seç</label>
    <input type="month" id="checkMonth" onchange="loadMonth()">
    <div class="total-card">
      <div class="label">Ayın toplamı</div>
      <div class="idr" id="monTotalIdr">Rp 0</div>
      <div class="usd" id="monTotalUsd"></div>
    </div>
    <div id="catChart"></div>
    <div class="items" id="dayRows"></div>
  </div>
</section>

<!-- KURULUM (Supabase bilgisi yoksa) -->
<section id="setup" class="screen">
  <button class="back" id="setupBack" onclick="show('home')">‹ Ana Sayfa</button>
  <h1>Kurulum</h1>
  <div class="setup-box">
    <p>Supabase proje adresini ve API anahtarını gir (cihaz başına tek seferlik). Anahtarı Supabase'de Project Settings → API bölümünde bulursun.</p>
    <label for="supaUrl">Supabase URL</label>
    <input type="url" id="supaUrl" placeholder="https://xxxx.supabase.co">
    <label for="supaKey">API anahtarı (anon / publishable)</label>
    <input type="text" id="supaKey" placeholder="eyJhbGci... veya sb_publishable_...">
    <label for="deviceName">Adın — kayıtlarda "kim girdi" olarak görünür (isteğe bağlı)</label>
    <input type="text" id="deviceName" placeholder="Örn. Enes" autocomplete="off">
    <div class="setup-err" id="setupErr"></div>
    <button class="primary" id="connectBtn" onclick="saveConfig()">Bağlan ve test et</button>
  </div>
</section>

<div class="toast" id="toast"></div>

<script>
// ── Yapılandırma ──────────────────────────────────────────────
// Buraya değer yazılırsa kurulum ekranı hiç görünmez.
const BUILTIN_URL = "";
const BUILTIN_KEY = "";

const cfg = {
  url: BUILTIN_URL || localStorage.getItem("supaUrl") || "",
  key: BUILTIN_KEY || localStorage.getItem("supaKey") || "",
};

const $ = (id) => document.getElementById(id);

let editingId = null;
let dayCache = {};

function show(id) {
  if (id !== "entry") editingId = null;
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
  if (id === "entry") {
    const rec = editingId ? dayCache[editingId] : null;
    $("entryTitle").textContent = rec ? "Harcamayı Düzenle" : "Harcama Girişi";
    $("entryBack").textContent = rec ? "‹ Vazgeç" : "‹ Ana Sayfa";
    $("saveBtn").textContent = rec ? "Güncelle" : "Kaydet";
    $("nameField").style.display = SHOW_NAME_FIELD ? "block" : "none";
    if (rec) {
      $("entryDate").value = rec.date;
      $("entryName").value = rec.name;
      $("entryNote").value = rec.note || "";
      $("amount").value = Number(rec.amount).toLocaleString("id-ID");
      $("amount").dispatchEvent(new Event("input"));
      selectedCat = rec.category || "Diğer";
      // Kaydın adı bir alt kategoriyle eşleşiyorsa onu seçili getir.
      selectedSub = (SUBCATS[selectedCat] || []).includes(rec.name) ? rec.name : null;
    } else {
      $("entryDate").value = today(); $("entryName").value = ""; $("entryNote").value = ""; $("amount").value = ""; $("usdHint").textContent = "";
      selectedCat = localStorage.getItem("lastCat") || "Diğer";
      selectedSub = null;
    }
    renderChips();
  }
  if (id === "check") {
    if (!$("checkDate").value) $("checkDate").value = today();
    if (checkMode === "day") loadDay(); else loadMonth();
  }
  if (id === "setup") {
    $("supaUrl").value = cfg.url; $("supaKey").value = cfg.key;
    $("deviceName").value = localStorage.getItem("deviceName") || "";
    $("setupErr").textContent = "";
    // İlk kurulumda dönülecek bir ana ekran yok; geri düğmesini gizle.
    $("setupBack").style.display = (cfg.url && cfg.key) ? "block" : "none";
  }
}

// Sağa kaydırarak ana sayfaya dön (sol kenardan başlayan kaydırmalarda).
let swipeStart = null;
document.addEventListener("touchstart", (e) => {
  const t = e.touches[0];
  swipeStart = { x: t.clientX, y: t.clientY };
}, { passive: true });
document.addEventListener("touchend", (e) => {
  if (!swipeStart) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - swipeStart.x, dy = Math.abs(t.clientY - swipeStart.y);
  if (swipeStart.x < 60 && dx > 70 && dy < 60 && !$("home").classList.contains("active") && cfg.url && cfg.key) show("home");
  swipeStart = null;
}, { passive: true });

function today() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

let toastTimer;
function toast(msg, isErr) {
  const t = $("toast");
  t.textContent = msg;
  t.className = "toast show" + (isErr ? " err" : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = "toast", isErr ? 5000 : 2200);
}

// Supabase'in döndürdüğü hatayı anlaşılır Türkçeye çevirir.
async function httpErrorText(res) {
  let detail = "";
  try { const j = await res.json(); detail = j.message || j.hint || ""; } catch (e) {}
  if (res.status === 401 || res.status === 403)
    return "Yetki hatası (" + res.status + "): API anahtarı yanlış ya da tabloda izin (RLS) politikası eksik." + (detail ? " — " + detail : "");
  if (res.status === 404)
    return "Tablo bulunamadı (404): 'expenses' tablosu yok. Supabase SQL Editor'da kurulum SQL'ini çalıştır.";
  return "Sunucu hatası (" + res.status + ")" + (detail ? ": " + detail : "");
}

// ── Sayı biçimleme ────────────────────────────────────────────
const fmtIdr = (n) => "Rp " + Math.round(n).toLocaleString("id-ID");
const fmtUsd = (n) => "$" + n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

$("amount").addEventListener("input", (e) => {
  const digits = e.target.value.replace(/\D/g, "");
  e.target.value = digits ? Number(digits).toLocaleString("id-ID") : "";
  const rate = getRate();
  $("usdHint").textContent = digits && rate ? "≈ " + fmtUsd(Number(digits) / rate) : "";
});

function parseAmount() {
  const digits = $("amount").value.replace(/\D/g, "");
  return digits ? Number(digits) : 0;
}

// ── Kategoriler ───────────────────────────────────────────────
// Serbest metin "Harcama kalemi" alanı: true yapılırsa alan geri gelir,
// kayıt adı yine elle yazılır. false iken ad, seçilen alt kategoriden gelir.
const SHOW_NAME_FIELD = false;

const CATS = ["Yemek", "Market", "Ulaşım", "Konaklama", "Aktivite", "Alışveriş", "Sağlık", "Diğer"];
const SUBCATS = {
  "Yemek": ["Kahvaltı", "Öğlen Yemeği", "Akşam Yemeği"],
  "Ulaşım": ["Yakıt", "Motor Kirası", "Uçak", "Tren", "Feribot", "Grab"],
  "Konaklama": ["Otel", "Ev", "Guesthouse"],
  "Aktivite": ["Müze", "Tapınak", "Gösteri", "Ören Yeri", "Eğlence"],
  "Diğer": ["Haberleşme", "Kişisel Bakım", "Vize", "Sigorta"],
};
let selectedCat = localStorage.getItem("lastCat") || "Diğer";
let selectedSub = null;

function renderChips() {
  if (!CATS.includes(selectedCat)) selectedCat = "Diğer";
  $("catChips").innerHTML = CATS.map(c =>
    `<button class="chip${c === selectedCat ? " sel" : ""}" onclick="pickCat('${c}')">${c}</button>`).join("");
  renderSubChips();
}

function renderSubChips() {
  const subs = SUBCATS[selectedCat] || [];
  $("subField").style.display = subs.length ? "block" : "none";
  $("subChips").innerHTML = subs.map(s =>
    `<button class="chip${s === selectedSub ? " sel" : ""}" onclick="pickSub('${s}')">${s}</button>`).join("");
}

function pickCat(c) {
  selectedCat = c;
  selectedSub = null;
  localStorage.setItem("lastCat", c);
  renderChips();
}

function pickSub(s) {
  selectedSub = s;
  renderSubChips();
}

// "yemek", "YEMEK", " yemek " → "Yemek": boşlukları toparla, baş harfi büyüt.
function normName(s) {
  s = s.trim().replace(/\s+/g, " ");
  return s ? s[0].toLocaleUpperCase("tr-TR") + s.slice(1) : s;
}

// ── Kayıt düzenleme ───────────────────────────────────────────
function startEdit(id) {
  if (!dayCache[id]) return;
  editingId = id;
  show("entry");
}

function exitEntry() {
  show(editingId ? "check" : "home");
}

async function updateExpense(row) {
  const id = editingId;
  $("saveBtn").disabled = true;
  let res, schemaWarnUpd = false;
  try {
    res = await fetch(cfg.url + "/rest/v1/expenses?id=eq." + id, {
      method: "PATCH", headers: headers(), body: JSON.stringify(row),
    });
    // "note" sütunu henüz yoksa o alan olmadan tekrar dene.
    if (res.status === 400 && (await res.clone().text()).includes("column")) {
      const { note, ...rest } = row;
      res = await fetch(cfg.url + "/rest/v1/expenses?id=eq." + id, {
        method: "PATCH", headers: headers(), body: JSON.stringify(rest),
      });
      schemaWarnUpd = res.ok;
    }
  } catch (e) {
    toast("İnternet yok — düzenleme kaydedilemedi, tekrar dene", true);
    $("saveBtn").disabled = false;
    return;
  }
  $("saveBtn").disabled = false;
  if (!res.ok) { toast(await httpErrorText(res), true); return; }
  toast(schemaWarnUpd ? "Güncellendi — not için KURULUM.md'deki güncelleme SQL'i gerekli" : "Güncellendi ✓", schemaWarnUpd);
  editingId = null;
  $("checkDate").value = row.date;
  show("check");
}

// ── Döviz kuru (USD → IDR) ────────────────────────────────────
function getRate() {
  const cached = JSON.parse(localStorage.getItem("usdIdrRate") || "null");
  return cached ? cached.rate : null;
}

async function refreshRate() {
  try {
    const res = await fetch("https://open.er-api.com/v6/latest/USD");
    const data = await res.json();
    if (data && data.rates && data.rates.IDR) {
      localStorage.setItem("usdIdrRate", JSON.stringify({ rate: data.rates.IDR, at: Date.now() }));
    }
  } catch (e) { /* çevrimdışı — son bilinen kur kullanılır */ }
  const cached = JSON.parse(localStorage.getItem("usdIdrRate") || "null");
  $("rateNote").textContent = cached
    ? "Kur: 1 USD ≈ Rp " + Math.round(cached.rate).toLocaleString("id-ID") +
      " (" + new Date(cached.at).toLocaleDateString("tr-TR") + ")"
    : "Kur bilgisi henüz alınamadı.";
}

// ── Supabase REST ─────────────────────────────────────────────
function headers() {
  return {
    "apikey": cfg.key,
    "Authorization": "Bearer " + cfg.key,
    "Content-Type": "application/json",
  };
}

async function saveExpense() {
  const date = $("entryDate").value;
  let name = $("entryName").value.trim();
  const amount = parseAmount();
  if (!date) return toast("Tarih seç", true);
  if (!SHOW_NAME_FIELD) {
    // Ad alanı gizliyken: alt kategori seçildiyse o, yoksa eski ad (düzenleme), o da yoksa kategori adı.
    if (selectedSub) name = selectedSub;
    if (!name) {
      if ((SUBCATS[selectedCat] || []).length) return toast("Alt kategori seç", true);
      name = selectedCat;
    }
  } else if (!name) return toast("Harcama kalemini yaz", true);
  if (!amount) return toast("Tutar gir", true);

  const row = { date, name: normName(name), amount, category: selectedCat };
  const note = $("entryNote").value.trim();
  // Düzenlemede not her zaman gönderilir ki silinen not da temizlenebilsin.
  if (editingId) { row.note = note || null; return updateExpense(row); }
  if (note) row.note = note;
  const who = (localStorage.getItem("deviceName") || "").trim();
  if (who) row.entered_by = who;
  $("saveBtn").disabled = true;
  let res, schemaWarn = false;
  try {
    res = await fetch(cfg.url + "/rest/v1/expenses", {
      method: "POST", headers: headers(), body: JSON.stringify(row),
    });
    // Veritabanında yeni sütunlar henüz yoksa eski biçimle tekrar dene.
    if (res.status === 400 && (await res.clone().text()).includes("column")) {
      res = await fetch(cfg.url + "/rest/v1/expenses", {
        method: "POST", headers: headers(),
        body: JSON.stringify({ date: row.date, name: row.name, amount: row.amount }),
      });
      schemaWarn = res.ok;
    }
  } catch (e) {
    // Ağ hatası: sunucuya hiç ulaşılamadı — kuyruğa al, bağlantı gelince gönderilir.
    toast(queuePending(row) ? "İnternet yok — kayıt beklemeye alındı" : "Bu kayıt zaten bekleme listesinde", true);
    $("saveBtn").disabled = false;
    return;
  }
  if (!res.ok) {
    // Sunucu hatası: tekrar denemek işe yaramaz, asıl sorunu göster.
    toast(await httpErrorText(res), true);
  } else {
    toast(schemaWarn ? "Kaydedildi — yeni alanlar için KURULUM.md'deki güncelleme SQL'i gerekli" : "Kaydedildi ✓", schemaWarn);
    $("entryName").value = ""; $("entryNote").value = ""; $("amount").value = ""; $("usdHint").textContent = "";
    flushPending();
  }
  $("saveBtn").disabled = false;
}

// Çevrimdışı kuyruk: gönderilemeyen kayıtlar saklanır, bağlantı gelince gönderilir.
const rowKey = (r) => r.date + "|" + r.name + "|" + Number(r.amount);

function queuePending(row) {
  const q = JSON.parse(localStorage.getItem("pendingRows") || "[]");
  if (q.some(r => rowKey(r) === rowKey(row))) { updatePendingNote(); return false; }
  q.push(row);
  localStorage.setItem("pendingRows", JSON.stringify(q));
  updatePendingNote();
  return true;
}

async function flushPending() {
  let q = JSON.parse(localStorage.getItem("pendingRows") || "[]");
  if (!q.length || !cfg.url) return null;
  // Üst üste dokunmadan oluşan birebir aynı kayıtları teke indir.
  const seen = new Set();
  q = q.filter(r => { const k = rowKey(r); if (seen.has(k)) return false; seen.add(k); return true; });
  const remaining = [];
  let lastError = null;
  for (const row of q) {
    try {
      const res = await fetch(cfg.url + "/rest/v1/expenses", {
        method: "POST", headers: headers(), body: JSON.stringify(row),
      });
      if (!res.ok) { remaining.push(row); lastError = await httpErrorText(res); }
    } catch (e) { remaining.push(row); lastError = "İnternet yok ya da sunucuya ulaşılamıyor."; }
  }
  localStorage.setItem("pendingRows", JSON.stringify(remaining));
  updatePendingNote();
  if (q.length && !remaining.length) toast("Bekleyen kayıtlar gönderildi ✓");
  return lastError;
}

async function retryPending() {
  const n = $("pendingNote");
  n.disabled = true;
  const err = await flushPending();
  n.disabled = false;
  if (err) toast(err, true);
}

function updatePendingNote() {
  const q = JSON.parse(localStorage.getItem("pendingRows") || "[]");
  const n = $("pendingNote");
  n.style.display = q.length ? "block" : "none";
  n.textContent = q.length ? "⏳ " + q.length + " kayıt gönderilmeyi bekliyor — göndermek için dokun" : "";
}

async function loadDay() {
  const date = $("checkDate").value;
  if (!date) return;
  const list = $("itemList");
  list.innerHTML = '<div class="empty">Yükleniyor…</div>';
  try {
    const res = await fetch(cfg.url + "/rest/v1/expenses?date=eq." + date + "&select=*&order=created_at.asc", { headers: headers() });
    if (!res.ok) throw new Error(await httpErrorText(res));
    const rows = await res.json();
    renderDay(rows);
  } catch (e) {
    const msg = e.message && e.message.length > 5 ? e.message : "İnternet yok ya da sunucuya ulaşılamıyor.";
    list.innerHTML = '<div class="empty">Veriler alınamadı.<br>' + escapeHtml(msg) + '</div>';
    $("dayTotalIdr").textContent = "—";
    $("dayTotalUsd").textContent = "";
  }
}

function renderDay(rows) {
  const rate = getRate();
  const total = rows.reduce((s, r) => s + Number(r.amount), 0);
  $("dayTotalIdr").textContent = fmtIdr(total);
  $("dayTotalUsd").textContent = rate ? "≈ " + fmtUsd(total / rate) : "";
  const list = $("itemList");
  dayCache = {};
  rows.forEach(r => dayCache[r.id] = r);
  if (!rows.length) { list.innerHTML = '<div class="empty">Bu gün için kayıt yok.</div>'; return; }
  list.innerHTML = rows.map(r => {
    // Ad zaten kategoriyle aynıysa (örn. "Market") etikette tekrarlama.
    const meta = [r.category !== r.name ? r.category : null, r.note, r.entered_by].filter(Boolean).join(" · ");
    return `
    <div class="item" onclick="startEdit('${r.id}')">
      <span class="name">${escapeHtml(r.name)}${meta ? `<span class="meta">${escapeHtml(meta)}</span>` : ""}</span>
      <span class="right">
        <span class="amt">${fmtIdr(Number(r.amount))}${rate ? `<small>≈ ${fmtUsd(Number(r.amount) / rate)}</small>` : ""}</span>
        <button class="del" onclick="event.stopPropagation(); delExpense('${r.id}')" aria-label="Sil">✕</button>
      </span>
    </div>`;
  }).join("");
}

// ── Ay görünümü ───────────────────────────────────────────────
let checkMode = "day";

function setCheckMode(m) {
  checkMode = m;
  $("segDay").classList.toggle("sel", m === "day");
  $("segMonth").classList.toggle("sel", m === "month");
  $("dayView").style.display = m === "day" ? "block" : "none";
  $("monthView").style.display = m === "month" ? "block" : "none";
  if (m === "month") {
    if (!$("checkMonth").value) $("checkMonth").value = today().slice(0, 7);
    loadMonth();
  } else {
    loadDay();
  }
}

async function loadMonth() {
  const ym = $("checkMonth").value;
  if (!ym) return;
  const rowsEl = $("dayRows");
  rowsEl.innerHTML = '<div class="empty">Yükleniyor…</div>';
  const [y, m] = ym.split("-").map(Number);
  const lastDay = new Date(y, m, 0).getDate();
  const from = ym + "-01", to = ym + "-" + String(lastDay).padStart(2, "0");
  try {
    const res = await fetch(cfg.url + "/rest/v1/expenses?date=gte." + from + "&date=lte." + to + "&select=date,amount,category", { headers: headers() });
    if (!res.ok) throw new Error(await httpErrorText(res));
    renderMonth(await res.json(), y, m, lastDay);
  } catch (e) {
    const msg = e.message && e.message.length > 5 ? e.message : "İnternet yok ya da sunucuya ulaşılamıyor.";
    rowsEl.innerHTML = '<div class="empty">Veriler alınamadı.<br>' + escapeHtml(msg) + '</div>';
    $("monTotalIdr").textContent = "—";
    $("monTotalUsd").textContent = "";
  }
}

const CAT_COLORS = {
  "Yemek": "#4f8cff", "Market": "#34c77b", "Ulaşım": "#f5c542", "Konaklama": "#e05252",
  "Aktivite": "#9b6cf2", "Alışveriş": "#ff8c4f", "Sağlık": "#4fd2e0", "Diğer": "#8b919e",
};

function renderCatChart(byCat, total) {
  const el = $("catChart");
  const cats = Object.entries(byCat).sort((a, b) => b[1] - a[1]);
  if (!total || !cats.length) { el.className = ""; el.innerHTML = ""; return; }

  const cx = 48, cy = 48, r = 42;
  let svg = "", angle = -Math.PI / 2;
  if (cats.length === 1) {
    svg = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${CAT_COLORS[cats[0][0]] || CAT_COLORS["Diğer"]}"/>`;
  } else {
    for (const [cat, sum] of cats) {
      const slice = (sum / total) * 2 * Math.PI;
      const x1 = cx + r * Math.cos(angle), y1 = cy + r * Math.sin(angle);
      angle += slice;
      const x2 = cx + r * Math.cos(angle), y2 = cy + r * Math.sin(angle);
      const large = slice > Math.PI ? 1 : 0;
      svg += `<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${large} 1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${CAT_COLORS[cat] || CAT_COLORS["Diğer"]}" stroke="var(--card)" stroke-width="1.5"/>`;
    }
  }

  const legend = cats.map(([cat, sum]) => `
    <div class="legend-row">
      <span class="legend-dot" style="background:${CAT_COLORS[cat] || CAT_COLORS["Diğer"]}"></span>
      <span class="legend-name">${escapeHtml(cat)}</span>
      <span class="legend-val">${fmtIdr(sum)} · %${Math.round((sum / total) * 100)}</span>
    </div>`).join("");

  el.className = "show";
  el.innerHTML = `<svg width="96" height="96" viewBox="0 0 96 96">${svg}</svg><div class="legend">${legend}</div>`;
}

function renderMonth(rows, y, m, lastDay) {
  const rate = getRate();
  const byDay = {}, byCat = {};
  let total = 0;
  for (const r of rows) {
    byDay[r.date] = (byDay[r.date] || 0) + Number(r.amount);
    const cat = r.category || "Diğer";
    byCat[cat] = (byCat[cat] || 0) + Number(r.amount);
    total += Number(r.amount);
  }
  $("monTotalIdr").textContent = fmtIdr(total);
  $("monTotalUsd").textContent = rate ? "≈ " + fmtUsd(total / rate) : "";
  renderCatChart(byCat, total);
  let html = "";
  for (let d = 1; d <= lastDay; d++) {
    const date = y + "-" + String(m).padStart(2, "0") + "-" + String(d).padStart(2, "0");
    const sum = byDay[date] || 0;
    const label = new Date(y, m - 1, d).toLocaleDateString("tr-TR", { day: "numeric", month: "long", weekday: "short" });
    html += `
    <div class="day-row${sum ? "" : " zero"}" onclick="openDay('${date}')">
      <span class="d">${label}</span>
      <span class="t">${fmtIdr(sum)}${sum && rate ? `<small>≈ ${fmtUsd(sum / rate)}</small>` : ""}</span>
    </div>`;
  }
  $("dayRows").innerHTML = html;
}

function openDay(date) {
  $("checkDate").value = date;
  setCheckMode("day");
}

async function delExpense(id) {
  if (!confirm("Bu kaydı silmek istiyor musun?")) return;
  try {
    const res = await fetch(cfg.url + "/rest/v1/expenses?id=eq." + id, { method: "DELETE", headers: headers() });
    if (!res.ok) throw new Error(await res.text());
    toast("Silindi");
    loadDay();
  } catch (e) { toast("Silinemedi — bağlantını kontrol et", true); }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// ── Kurulum ───────────────────────────────────────────────────
async function saveConfig() {
  let url = $("supaUrl").value.trim().replace(/\/+$/, "");
  const key = $("supaKey").value.trim();
  const errEl = $("setupErr");
  // Yanlışlıkla dashboard adresi yapıştırıldıysa proje adresine çevir.
  const dash = url.match(/supabase\.com\/dashboard\/project\/([a-z0-9]{15,25})/);
  if (dash) url = "https://" + dash[1] + ".supabase.co";
  // Sonuna /rest/v1 eklenmiş olarak yapıştırıldıysa temizle (uygulama kendisi ekliyor).
  url = url.replace(/\/rest\/v1\/?$/, "");
  if (url && !/^https?:\/\//.test(url)) url = "https://" + url;
  if (!url || !key) { errEl.textContent = "İki alanı da doldur."; return; }

  $("connectBtn").disabled = true;
  errEl.textContent = "Bağlantı deneniyor…";
  try {
    const res = await fetch(url + "/rest/v1/expenses?select=id&limit=1", {
      headers: { "apikey": key, "Authorization": "Bearer " + key },
    });
    if (!res.ok) { errEl.textContent = "✗ " + await httpErrorText(res); $("connectBtn").disabled = false; return; }
  } catch (e) {
    errEl.textContent = "✗ Sunucuya ulaşılamadı. URL'yi ve internet bağlantını kontrol et.";
    $("connectBtn").disabled = false;
    return;
  }
  $("connectBtn").disabled = false;
  errEl.textContent = "";
  localStorage.setItem("supaUrl", url);
  localStorage.setItem("supaKey", key);
  localStorage.setItem("deviceName", $("deviceName").value.trim());
  cfg.url = url; cfg.key = key;
  toast("Bağlantı doğrulandı ✓");
  show("home");
  flushPending();
}

// ── Başlangıç ─────────────────────────────────────────────────
if (!cfg.url || !cfg.key) show("setup");
refreshRate();
updatePendingNote();
flushPending();
window.addEventListener("online", flushPending);

if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
</script>
