<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Gezi Harcama</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Harcama">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --card2: #232733;
    --text: #f2f3f5;
    --muted: #8b919e;
    --accent: #4f8cff;
    --green: #34c77b;
    --red: #e05252;
    --radius: 16px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; }
  body { min-height: 100vh; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
  .screen { display: none; max-width: 480px; margin: 0 auto; padding: 24px 20px 40px; }
  .screen.active { display: block; }
  h1 { font-size: 26px; font-weight: 700; margin: 12px 0 4px; }
  .sub { color: var(--muted); font-size: 14px; margin: 0 0 28px; }

  .bigbtn { display: flex; align-items: center; gap: 16px; width: 100%;
    background: var(--card); border: 1px solid #2a2f3a; border-radius: var(--radius);
    padding: 22px 20px; margin-bottom: 16px; color: var(--text); font-size: 18px;
    font-weight: 600; cursor: pointer; text-align: left; }
  .bigbtn:active { background: var(--card2); }
  .bigbtn .emoji { font-size: 28px; }
  .bigbtn .desc { display: block; font-size: 13px; font-weight: 400; color: var(--muted); margin-top: 3px; }

  .back { background: none; border: none; color: var(--accent); font-size: 16px;
    padding: 0; margin-bottom: 8px; cursor: pointer; }

  label { display: block; font-size: 13px; color: var(--muted); margin: 18px 0 6px; }
  input[type="date"], input[type="text"], input[type="url"] {
    width: 100%; background: var(--card); border: 1px solid #2a2f3a; border-radius: 12px;
    color: var(--text); font-size: 17px; padding: 14px; appearance: none; -webkit-appearance: none; }
  input[type="date"] { min-height: 50px; }
  .amount-wrap { position: relative; }
  .amount-wrap .prefix { position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 17px; }
  #amount { width: 100%; background: var(--card); border: 1px solid #2a2f3a; border-radius: 12px;
    color: var(--text); font-size: 17px; padding: 14px 14px 14px 46px; -webkit-appearance: none; }
  .usd-hint { font-size: 13px; color: var(--muted); margin-top: 6px; min-height: 16px; }

  .primary { width: 100%; background: var(--accent); border: none; border-radius: 12px;
    color: #fff; font-size: 17px; font-weight: 600; padding: 16px; margin-top: 28px; cursor: pointer; }
  .primary:active { opacity: .85; }
  .primary:disabled { opacity: .5; }

  .toast { position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%) translateY(20px);
    background: var(--green); color: #fff; padding: 12px 22px; border-radius: 30px;
    font-size: 15px; font-weight: 600; opacity: 0; pointer-events: none; transition: all .25s; z-index: 50; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.err { background: var(--red); }

  .total-card { background: var(--card); border: 1px solid #2a2f3a; border-radius: var(--radius);
    padding: 20px; margin-top: 20px; text-align: center; }
  .total-card .idr { font-size: 30px; font-weight: 700; }
  .total-card .usd { font-size: 17px; color: var(--green); margin-top: 4px; font-weight: 600; }
  .total-card .label { font-size: 13px; color: var(--muted); margin-bottom: 6px; }

  .items { margin-top: 16px; }
  .item { display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border: 1px solid #2a2f3a; border-radius: 12px;
    padding: 14px 16px; margin-bottom: 10px; }
  .item .name { font-size: 16px; }
  .item .right { display: flex; align-items: center; gap: 12px; }
  .item .amt { font-size: 16px; font-weight: 600; white-space: nowrap; }
  .item .amt small { display: block; font-weight: 400; color: var(--muted); font-size: 12px; text-align: right; }
  .item .del { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; }
  .empty { text-align: center; color: var(--muted); padding: 30px 0; font-size: 15px; }

  .rate-note { text-align: center; color: var(--muted); font-size: 12px; margin-top: 24px; }
  .pending-note { text-align: center; color: #e8b84a; font-size: 13px; margin-top: 10px; }

  .setup-box { background: var(--card); border-radius: var(--radius); padding: 20px; margin-top: 20px; }
  .setup-box p { font-size: 14px; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>

<!-- ANA SAYFA -->
<section id="home" class="screen active">
  <h1>Gezi Harcama 🧳</h1>
  <p class="sub">Günlük harcamalarınızı birlikte takip edin.</p>
  <button class="bigbtn" onclick="show('entry')">
    <span class="emoji">✏️</span>
    <span>Harcama Girişi<span class="desc">Yeni bir harcama kaydet</span></span>
  </button>
  <button class="bigbtn" onclick="show('check')">
    <span class="emoji">📊</span>
    <span>Harcama Kontrol<span class="desc">Gün seç, toplamı gör</span></span>
  </button>
  <p class="rate-note" id="rateNote"></p>
  <p class="pending-note" id="pendingNote" style="display:none"></p>
</section>

<!-- HARCAMA GİRİŞİ -->
<section id="entry" class="screen">
  <button class="back" onclick="show('home')">‹ Ana Sayfa</button>
  <h1>Harcama Girişi</h1>
  <label for="entryDate">Tarih</label>
  <input type="date" id="entryDate">
  <label for="entryName">Harcama kalemi</label>
  <input type="text" id="entryName" placeholder="Örn. Akşam yemeği" autocomplete="off">
  <label for="amount">Tutar (IDR)</label>
  <div class="amount-wrap">
    <span class="prefix">Rp</span>
    <input type="text" id="amount" inputmode="numeric" placeholder="150.000" autocomplete="off">
  </div>
  <div class="usd-hint" id="usdHint"></div>
  <button class="primary" id="saveBtn" onclick="saveExpense()">Kaydet</button>
</section>

<!-- HARCAMA KONTROL -->
<section id="check" class="screen">
  <button class="back" onclick="show('home')">‹ Ana Sayfa</button>
  <h1>Harcama Kontrol</h1>
  <label for="checkDate">Gün seç</label>
  <input type="date" id="checkDate" onchange="loadDay()">
  <div class="total-card">
    <div class="label">Günün toplamı</div>
    <div class="idr" id="dayTotalIdr">Rp 0</div>
    <div class="usd" id="dayTotalUsd">$0.00</div>
  </div>
  <div class="items" id="itemList"></div>
</section>

<!-- KURULUM (Supabase bilgisi yoksa) -->
<section id="setup" class="screen">
  <h1>Kurulum</h1>
  <div class="setup-box">
    <p>Ortak veritabanı bağlantısı henüz tanımlı değil. Supabase proje adresini ve anon anahtarını gir (tek seferlik).</p>
    <label for="supaUrl">Supabase URL</label>
    <input type="url" id="supaUrl" placeholder="https://xxxx.supabase.co">
    <label for="supaKey">Anon anahtarı</label>
    <input type="text" id="supaKey" placeholder="eyJhbGciOi...">
    <button class="primary" onclick="saveConfig()">Bağlan</button>
  </div>
</section>

<div class="toast" id="toast"></div>

<script>
// ── Yapılandırma ──────────────────────────────────────────────
// Buraya değer yazılırsa kurulum ekranı hiç görünmez.
const BUILTIN_URL = "";
const BUILTIN_KEY = "";

const cfg = {
  url: BUILTIN_URL || localStorage.getItem("supaUrl") || "",
  key: BUILTIN_KEY || localStorage.getItem("supaKey") || "",
};

const $ = (id) => document.getElementById(id);

function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
  if (id === "entry") { $("entryDate").value = today(); $("entryName").value = ""; $("amount").value = ""; $("usdHint").textContent = ""; }
  if (id === "check") { if (!$("checkDate").value) $("checkDate").value = today(); loadDay(); }
}

function today() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function toast(msg, isErr) {
  const t = $("toast");
  t.textContent = msg;
  t.className = "toast show" + (isErr ? " err" : "");
  setTimeout(() => t.className = "toast", 2200);
}

// ── Sayı biçimleme ────────────────────────────────────────────
const fmtIdr = (n) => "Rp " + Math.round(n).toLocaleString("id-ID");
const fmtUsd = (n) => "$" + n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

$("amount").addEventListener("input", (e) => {
  const digits = e.target.value.replace(/\D/g, "");
  e.target.value = digits ? Number(digits).toLocaleString("id-ID") : "";
  const rate = getRate();
  $("usdHint").textContent = digits && rate ? "≈ " + fmtUsd(Number(digits) / rate) : "";
});

function parseAmount() {
  const digits = $("amount").value.replace(/\D/g, "");
  return digits ? Number(digits) : 0;
}

// ── Döviz kuru (USD → IDR) ────────────────────────────────────
function getRate() {
  const cached = JSON.parse(localStorage.getItem("usdIdrRate") || "null");
  return cached ? cached.rate : null;
}

async function refreshRate() {
  try {
    const res = await fetch("https://open.er-api.com/v6/latest/USD");
    const data = await res.json();
    if (data && data.rates && data.rates.IDR) {
      localStorage.setItem("usdIdrRate", JSON.stringify({ rate: data.rates.IDR, at: Date.now() }));
    }
  } catch (e) { /* çevrimdışı — son bilinen kur kullanılır */ }
  const cached = JSON.parse(localStorage.getItem("usdIdrRate") || "null");
  $("rateNote").textContent = cached
    ? "Kur: 1 USD ≈ Rp " + Math.round(cached.rate).toLocaleString("id-ID") +
      " (" + new Date(cached.at).toLocaleDateString("tr-TR") + ")"
    : "Kur bilgisi henüz alınamadı.";
}

// ── Supabase REST ─────────────────────────────────────────────
function headers() {
  return {
    "apikey": cfg.key,
    "Authorization": "Bearer " + cfg.key,
    "Content-Type": "application/json",
  };
}

async function saveExpense() {
  const date = $("entryDate").value;
  const name = $("entryName").value.trim();
  const amount = parseAmount();
  if (!date) return toast("Tarih seç", true);
  if (!name) return toast("Harcama kalemini yaz", true);
  if (!amount) return toast("Tutar gir", true);

  const row = { date, name, amount };
  $("saveBtn").disabled = true;
  try {
    const res = await fetch(cfg.url + "/rest/v1/expenses", {
      method: "POST", headers: headers(), body: JSON.stringify(row),
    });
    if (!res.ok) throw new Error(await res.text());
    toast("Kaydedildi ✓");
    $("entryName").value = ""; $("amount").value = ""; $("usdHint").textContent = "";
    flushPending();
  } catch (e) {
    queuePending(row);
    toast("Bağlantı yok — sonra gönderilecek", true);
  }
  $("saveBtn").disabled = false;
}

// Çevrimdışı kuyruk: gönderilemeyen kayıtlar saklanır, bağlantı gelince gönderilir.
function queuePending(row) {
  const q = JSON.parse(localStorage.getItem("pendingRows") || "[]");
  q.push(row);
  localStorage.setItem("pendingRows", JSON.stringify(q));
  updatePendingNote();
}

async function flushPending() {
  let q = JSON.parse(localStorage.getItem("pendingRows") || "[]");
  if (!q.length || !cfg.url) return;
  const remaining = [];
  for (const row of q) {
    try {
      const res = await fetch(cfg.url + "/rest/v1/expenses", {
        method: "POST", headers: headers(), body: JSON.stringify(row),
      });
      if (!res.ok) remaining.push(row);
    } catch (e) { remaining.push(row); }
  }
  localStorage.setItem("pendingRows", JSON.stringify(remaining));
  updatePendingNote();
  if (q.length && !remaining.length) toast("Bekleyen kayıtlar gönderildi ✓");
}

function updatePendingNote() {
  const q = JSON.parse(localStorage.getItem("pendingRows") || "[]");
  const n = $("pendingNote");
  n.style.display = q.length ? "block" : "none";
  n.textContent = q.length ? "⏳ " + q.length + " kayıt gönderilmeyi bekliyor" : "";
}

async function loadDay() {
  const date = $("checkDate").value;
  if (!date) return;
  const list = $("itemList");
  list.innerHTML = '<div class="empty">Yükleniyor…</div>';
  try {
    const res = await fetch(cfg.url + "/rest/v1/expenses?date=eq." + date + "&select=*&order=created_at.asc", { headers: headers() });
    if (!res.ok) throw new Error(await res.text());
    const rows = await res.json();
    renderDay(rows);
  } catch (e) {
    list.innerHTML = '<div class="empty">Veriler alınamadı. Bağlantını kontrol et.</div>';
    $("dayTotalIdr").textContent = "—";
    $("dayTotalUsd").textContent = "";
  }
}

function renderDay(rows) {
  const rate = getRate();
  const total = rows.reduce((s, r) => s + Number(r.amount), 0);
  $("dayTotalIdr").textContent = fmtIdr(total);
  $("dayTotalUsd").textContent = rate ? "≈ " + fmtUsd(total / rate) : "";
  const list = $("itemList");
  if (!rows.length) { list.innerHTML = '<div class="empty">Bu gün için kayıt yok.</div>'; return; }
  list.innerHTML = rows.map(r => `
    <div class="item">
      <span class="name">${escapeHtml(r.name)}</span>
      <span class="right">
        <span class="amt">${fmtIdr(Number(r.amount))}${rate ? `<small>≈ ${fmtUsd(Number(r.amount) / rate)}</small>` : ""}</span>
        <button class="del" onclick="delExpense('${r.id}')" aria-label="Sil">✕</button>
      </span>
    </div>`).join("");
}

async function delExpense(id) {
  if (!confirm("Bu kaydı silmek istiyor musun?")) return;
  try {
    const res = await fetch(cfg.url + "/rest/v1/expenses?id=eq." + id, { method: "DELETE", headers: headers() });
    if (!res.ok) throw new Error(await res.text());
    toast("Silindi");
    loadDay();
  } catch (e) { toast("Silinemedi — bağlantını kontrol et", true); }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// ── Kurulum ───────────────────────────────────────────────────
function saveConfig() {
  const url = $("supaUrl").value.trim().replace(/\/$/, "");
  const key = $("supaKey").value.trim();
  if (!url || !key) return toast("İki alanı da doldur", true);
  localStorage.setItem("supaUrl", url);
  localStorage.setItem("supaKey", key);
  cfg.url = url; cfg.key = key;
  toast("Bağlandı ✓");
  show("home");
}

// ── Başlangıç ─────────────────────────────────────────────────
if (!cfg.url || !cfg.key) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $("setup").classList.add("active");
}
refreshRate();
updatePendingNote();
flushPending();
window.addEventListener("online", flushPending);

if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
</script>
</body>
</html>
